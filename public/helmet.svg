  <!-- Eye slit glow -->
  <rect x="18" y="29.5" width="28" height="3" rx="0.5" fill="#facc15" opacity="0.3"/>
  <!-- Chin guard -->
  <path d="M14 36H50V42C50 46 46 52 32 52C18 52 14 46 14 42V36Z" fill="#3f3f46" stroke="#a1a1aa" stroke-width="2"/>
